name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Rust check
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Clone shuru SDK
        run: git clone --depth 1 https://github.com/superhq-ai/shuru.git ../shuru

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - run: cargo check
